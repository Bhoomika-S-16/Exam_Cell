<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin – Upload Seating Data</title>

  <!-- XLSX LIBRARY (DO NOT TOUCH) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(180deg, #eaf7ff, #f5fbff);
  color: #0f172a;
}


    .glass {
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255, 255, 255, 0.6);
}


    .admin-container {
  width: 420px;
  padding: 28px;
  border-radius: 18px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.18);
}


    h2 {
  text-align: center;
  margin-bottom: 25px;
  letter-spacing: 1px;
  font-weight: 700;
  color: #0f172a;
}


    .session-box {
  background: rgba(255, 255, 255, 0.8);
  border: 1px solid rgba(15, 23, 42, 0.12);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 18px;
}


    .session-box h3 {
  margin-top: 0;
  margin-bottom: 12px;
  font-size: 15px;
  font-weight: 600;
  color: #1e40af;
}


   input[type="file"] {
  width: 100%;
  margin-bottom: 12px;
  padding: 8px;
  background: #ffffff;
  color: #0f172a;
  border: 1px solid #cbd5f5;
  border-radius: 8px;
}


    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(37,99,235,0.35);
    }

    button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .footer-note {
  margin-top: 14px;
  text-align: center;
  font-size: 11px;
  color: #475569;
  opacity: 0.85;
}

  </style>
</head>

<body>

<div class="admin-container glass">
  <h2>ADMIN – SEATING UPLOAD</h2>

  <div class="session-box">
    <h3>FN Session</h3>
    <input type="file" id="FN_file" accept=".xlsx,.xls">
    <button onclick="uploadExcel('FN')">Upload FN</button>
  </div>

  <div class="session-box">
    <h3>AN Session</h3>
    <input type="file" id="AN_file" accept=".xlsx,.xls">
    <button onclick="uploadExcel('AN')">Upload AN</button>
  </div>

  <div class="footer-note">
    Admin panel • Excel (.xlsx / .xls)
  </div>
</div>

<script>
async function uploadExcel(session) {
  try {
    const fileInput = document.getElementById(session + "_file");
    const file = fileInput.files[0];
    if (!file) {
      alert("NO FILE SELECTED");
      return;
    }

    const buffer = await file.arrayBuffer();
    const workbook = XLSX.read(buffer, { type: "array" });
    let finalData = [];

    workbook.SheetNames.forEach(sheetName => {
      const sheet = workbook.Sheets[sheetName];
      const matrix = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

      // ----- HALL DETECTION (UNCHANGED) -----
      let detectedHall = "";
      const merges = sheet["!merges"] || [];
      let hallLabelCell = null;

      for (const addr in sheet) {
        if (addr[0] === "!") continue;
        const cell = sheet[addr];
        if (cell.v && String(cell.v).trim().toUpperCase() === "HALL NO:") {
          hallLabelCell = XLSX.utils.decode_cell(addr);
          break;
        }
      }

      if (hallLabelCell) {
        for (const m of merges) {
          if (
            m.s.r === hallLabelCell.r &&
            hallLabelCell.c >= m.s.c &&
            hallLabelCell.c <= m.e.c
          ) {
            const nextMerge = merges.find(n =>
              n.s.r === m.s.r && n.s.c > m.e.c
            );
            if (nextMerge) {
              const hallAddr = XLSX.utils.encode_cell({
                r: nextMerge.s.r,
                c: nextMerge.s.c
              });
              detectedHall = String(sheet[hallAddr]?.v || "").trim();
            }
            break;
          }
        }
      }

      // ----- HEADER DETECTION -----
      let headerRow = -1;
      for (let i = 0; i < matrix.length; i++) {
        if (
          matrix[i].includes("REGISTER NO") &&
          matrix[i].includes("STUDENT NAME") &&
          matrix[i].includes("DESK NO")
        ) {
          headerRow = i;
          break;
        }
      }
      // ----- SIDE DETECTION (LEFT / RIGHT) -----
// ----- SIDE DETECTION (MERGE-BASED, ACTUALLY CORRECT) -----
let detectedSide = "";

const mergesAboveHeader = (sheet["!merges"] || []).filter(m => m.e.r < headerRow);

for (const m of mergesAboveHeader) {
  const addr = XLSX.utils.encode_cell({ r: m.s.r, c: m.s.c });
  const cell = sheet[addr];
  if (!cell || !cell.v) continue;

  const raw = String(cell.v)
    .toUpperCase()
    .replace(/\s+/g, " ")
    .trim();

  if (raw.includes("LEFT")) {
    detectedSide = "LEFT";
    break;
  }

  if (raw.includes("RIGHT")) {
    detectedSide = "RIGHT";
    break;
  }
}

if (!detectedSide) {
  console.warn(`❌ SIDE NOT FOUND (MERGE READ FAILED) | sheet=${sheetName}`);
}

      if (headerRow === -1) return;

      const headers = matrix[headerRow];
      const r = headers.indexOf("REGISTER NO");
      const n = headers.indexOf("STUDENT NAME");
      const s = headers.indexOf("DESK NO");

      for (let i = headerRow + 1; i < matrix.length; i++) {
        const row = matrix[i];
        if (!row[r] || !row[n] || !row[s]) continue;

        finalData.push({
          "REGISTER NUMBER": String(row[r]).trim().toUpperCase(),
          "NAME": String(row[n]).trim(),
          "SEAT": String(row[s]).trim(),
          "HALL": detectedHall,
          "SIDE": detectedSide
        });
      }
    });

    if (finalData.length === 0) {
      alert("❌ NO VALID SEATING DATA FOUND");
      return;
    }

    const res = await fetch(
      "https://seat-finder-api.harjeetgowda644.workers.dev/admin/upload",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session, data: finalData })
      }
    );

    if (!res.ok) throw new Error("UPLOAD FAILED");

    alert(`✅ ${session} UPLOADED (${finalData.length} RECORDS)`);

  } catch (err) {
    console.error(err);
    alert("❌ ERROR – CHECK CONSOLE");
  }
}
</script>

</body>
</html>
