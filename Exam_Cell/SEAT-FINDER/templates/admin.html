<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin – Upload Seating Data</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .admin-card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      width: 420px;
      text-align: center;
    }

    .upload-box {
      border: 2px dashed #c7c7c7;
      padding: 20px;
      border-radius: 12px;
      margin: 20px 0;
    }

    .upload-box h3 {
      margin-bottom: 10px;
    }

    .status {
      margin-top: 10px;
      font-weight: bold;
      color: green;
      min-height: 20px;
    }

    .admin-title {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<div class="admin-card">
  <h1 class="admin-title">Admin Panel</h1>

  <!-- FN Upload -->
  <div class="upload-box">
    <h3>FN Session Excel</h3>
    <input type="file" id="fn">
    <button onclick="upload('FN')">Upload FN</button>
    <div id="fn-status" class="status"></div>
  </div>

  <!-- AN Upload -->
  <div class="upload-box">
    <h3>AN Session Excel</h3>
    <input type="file" id="an">
    <button onclick="upload('AN')">Upload AN</button>
    <div id="an-status" class="status"></div>
  </div>

</div>

<script>
function upload(session){
  const input = document.getElementById(session.toLowerCase());
  const status = document.getElementById(session.toLowerCase() + "-status");

  if(!input.files.length){
    status.style.color = "red";
    status.innerText = "Please select an Excel file";
    return;
  }

  const fd = new FormData();
  fd.append("file", input.files[0]);
  fd.append("session", session);

  status.style.color = "#444";
  status.innerText = "Uploading...";

  fetch("/admin", {
    method: "POST",
    body: fd
  })
  .then(res => res.json())
  .then(data => {
    if(data.status === "ok"){
      status.style.color = "green";
      status.innerText = session + " file uploaded successfully ✔";
      input.value = "";
    } else {
      status.style.color = "red";
      status.innerText = "Upload failed";
    }
  })
  .catch(() => {
    status.style.color = "red";
    status.innerText = "Server error";
  });
}
</script>

</body>
</html>
