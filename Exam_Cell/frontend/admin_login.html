<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — KCLAS Exam Cell</title>
    <meta name="description" content="Admin login for KCLAS Exam Attendance System.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#003594',
                        'primary-light': '#004dc5',
                        'primary-dark': '#001d51'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #001d51 0%, #003594 40%, #0054b4 70%, #7be7ff 100%) fixed;
            min-height: 100vh;
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        .particle {
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            pointer-events: none;
            animation: float 20s infinite ease-in-out;
        }

        .particle:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 10%;
            left: 10%;
            animation-duration: 18s;
        }

        .particle:nth-child(2) {
            width: 120px;
            height: 120px;
            top: 60%;
            right: 15%;
            animation-delay: -5s;
            animation-duration: 22s;
        }

        .particle:nth-child(3) {
            width: 60px;
            height: 60px;
            bottom: 20%;
            left: 25%;
            animation-delay: -10s;
            animation-duration: 25s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            25% {
                transform: translate(30px, -50px) scale(1.1);
            }

            50% {
                transform: translate(-20px, 20px) scale(0.95);
            }

            75% {
                transform: translate(50px, 30px) scale(1.05);
            }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .login-input:focus {
            box-shadow: 0 0 0 4px rgba(0, 53, 148, 0.1);
        }

        .btn-login {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn-login::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 50%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transform: skewX(-20deg);
            transition: left 0.6s ease;
        }

        .btn-login:hover::after {
            left: 120%;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(0, 53, 148, 0.4);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-up {
            animation: fadeUp 0.7s ease-out forwards;
        }

        .animate-fade-up-delay {
            animation: fadeUp 0.7s ease-out 0.15s forwards;
            opacity: 0;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            15%,
            45%,
            75% {
                transform: translateX(-8px);
            }

            30%,
            60%,
            90% {
                transform: translateX(8px);
            }
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8 animate-fade-up">
            <img src="KCLAS_Logo.jpg" alt="KCLAS Logo"
                class="h-16 md:h-20 mx-auto mb-4 rounded-xl shadow-lg border-2 border-white/20">
            <h1 class="text-2xl md:text-3xl font-extrabold text-white tracking-tight drop-shadow-lg">
                Exam Cell — Admin
            </h1>
            <p class="text-blue-200 text-sm mt-2 font-medium">Administrator Login</p>
        </div>

        <!-- Login Card -->
        <div class="login-card rounded-3xl shadow-2xl p-8 md:p-10 animate-fade-up-delay" id="loginCard">
            <!-- Role Badge -->
            <div class="flex items-center gap-3 mb-7 pb-5 border-b border-slate-100">
                <div
                    class="w-12 h-12 rounded-xl bg-gradient-to-br from-primary to-primary-light flex items-center justify-center text-white shadow-md">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z">
                        </path>
                    </svg>
                </div>
                <div>
                    <div class="font-bold text-slate-800 text-sm">Administrator Portal</div>
                    <div class="text-xs text-slate-400 font-medium">Manage exams, seating & reports</div>
                </div>
            </div>

            <!-- Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="space-y-5">
                    <div>
                        <label for="username"
                            class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Username</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z">
                                    </path>
                                </svg>
                            </div>
                            <input type="text" id="username" placeholder="Enter admin username" autocomplete="username"
                                class="login-input w-full pl-12 pr-4 py-3.5 border-2 border-slate-200 rounded-xl outline-none bg-slate-50/50 focus:border-primary focus:bg-white text-sm font-medium transition-all">
                        </div>
                    </div>
                    <div>
                        <label for="password"
                            class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z">
                                    </path>
                                </svg>
                            </div>
                            <input type="password" id="password" placeholder="Enter password"
                                autocomplete="current-password"
                                class="login-input w-full pl-12 pr-12 py-3.5 border-2 border-slate-200 rounded-xl outline-none bg-slate-50/50 focus:border-primary focus:bg-white text-sm font-medium transition-all">
                            <button type="button" onclick="togglePassword()"
                                class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 transition-colors">
                                <svg class="w-5 h-5" id="eyeIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.64 0 8.577 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.64 0-8.577-3.007-9.963-7.178z">
                                    </path>
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div id="errorMsg"
                    class="hidden mt-4 p-3 bg-red-50 text-red-600 border border-red-200 rounded-xl text-sm font-semibold text-center">
                </div>

                <button type="submit" id="loginBtn"
                    class="btn-login w-full mt-7 py-4 bg-gradient-to-r from-primary to-primary-light text-white rounded-xl font-bold text-base tracking-wide flex items-center justify-center gap-2">
                    <span id="loginBtnText">Sign In as Admin</span>
                    <div id="loginSpinner" class="spinner hidden"></div>
                    <svg id="loginArrow" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3">
                        </path>
                    </svg>
                </button>
            </form>

            <!-- Hint -->
            <div class="mt-5 p-3 bg-blue-50/80 rounded-xl border border-blue-100">
                <div class="flex items-start gap-2">
                    <svg class="w-4 h-4 text-blue-500 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z">
                        </path>
                    </svg>
                    <div class="text-xs text-blue-600 font-medium">
                        <span class="font-bold">Default:</span> admin / admin123
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-6 mb-6">
            <p class="text-blue-300/60 text-[10px] font-medium">
                &copy; 2026 KCLAS Exam Cell &bull; Dept of Data Science
            </p>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const API_BASE = window.APP_CONFIG ? window.APP_CONFIG.getApiBase() : `${window.location.protocol}//${window.location.hostname}:8000/api`;
        const LOGIN_ROLE = 'admin';

        // If already logged in as admin, redirect straight to dashboard
        (function () {
            const token = sessionStorage.getItem('auth_token');
            const role = sessionStorage.getItem('auth_role');
            if (token && role === LOGIN_ROLE) {
                fetch(`${API_BASE}/auth/verify`, { headers: { 'X-Auth-Token': token } })
                    .then(r => { if (r.ok) window.location.href = '/admin'; })
                    .catch(() => { });
            }
        })();

        function togglePassword() {
            const pw = document.getElementById('password');
            pw.type = pw.type === 'password' ? 'text' : 'password';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');
            const spinner = document.getElementById('loginSpinner');
            const arrow = document.getElementById('loginArrow');

            if (!username || !password) { showError('Please enter both username and password.'); return; }

            loginBtn.disabled = true;
            btnText.textContent = 'Signing in...';
            spinner.classList.remove('hidden');
            arrow.classList.add('hidden');
            errorEl.classList.add('hidden');

            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role: LOGIN_ROLE })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Login failed');

                sessionStorage.setItem('auth_token', data.token);
                sessionStorage.setItem('auth_role', data.role);

                loginBtn.classList.remove('from-primary', 'to-primary-light');
                loginBtn.classList.add('from-green-500', 'to-green-600');
                btnText.textContent = 'Success!';
                spinner.classList.add('hidden');

                setTimeout(() => { window.location.href = '/admin'; }, 500);
            } catch (err) {
                showError(err.message);
                loginBtn.disabled = false;
                btnText.textContent = 'Sign In as Admin';
                spinner.classList.add('hidden');
                arrow.classList.remove('hidden');
            }
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.remove('hidden');
            document.getElementById('loginCard').classList.add('shake');
            setTimeout(() => document.getElementById('loginCard').classList.remove('shake'), 500);
        }
    </script>
</body>

</html>
