<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — KCLAS Exam Cell</title>
    <meta name="description" content="Login to KCLAS Exam Attendance System. Admin and Invigilator access portal.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#003594',
                        'primary-light': '#004dc5',
                        'primary-dark': '#001d51'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #001d51 0%, #003594 40%, #0054b4 70%, #7be7ff 100%) fixed;
            min-height: 100vh;
        }

        /* Animated gradient background */
        .bg-animate {
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        /* Floating particles */
        .particle {
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            pointer-events: none;
            animation: float 20s infinite ease-in-out;
        }

        .particle:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
            animation-duration: 18s;
        }

        .particle:nth-child(2) {
            width: 120px;
            height: 120px;
            top: 60%;
            right: 15%;
            animation-delay: -5s;
            animation-duration: 22s;
        }

        .particle:nth-child(3) {
            width: 60px;
            height: 60px;
            bottom: 20%;
            left: 25%;
            animation-delay: -10s;
            animation-duration: 25s;
        }

        .particle:nth-child(4) {
            width: 150px;
            height: 150px;
            top: 30%;
            right: 30%;
            animation-delay: -7s;
            animation-duration: 20s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            25% {
                transform: translate(30px, -50px) scale(1.1);
            }

            50% {
                transform: translate(-20px, 20px) scale(0.95);
            }

            75% {
                transform: translate(50px, 30px) scale(1.05);
            }
        }

        /* Card glass effect */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Role cards */
        .role-card {
            border: 2px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .role-card:hover {
            border-color: #003594;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 53, 148, 0.15);
        }

        .role-card.active {
            border-color: #003594;
            background: linear-gradient(135deg, #f0f4ff 0%, #e8edff 100%);
            box-shadow: 0 4px 15px rgba(0, 53, 148, 0.2);
        }

        .role-card.active .role-icon {
            background: linear-gradient(135deg, #003594, #004dc5);
            color: white;
        }

        .role-card.active .role-check {
            opacity: 1;
            transform: scale(1);
        }

        .role-check {
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Input focus effects */
        .login-input {
            transition: all 0.3s ease;
        }

        .login-input:focus {
            box-shadow: 0 0 0 4px rgba(0, 53, 148, 0.1);
        }

        /* Button shimmer */
        .btn-login {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn-login::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 50%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transform: skewX(-20deg);
            transition: left 0.6s ease;
        }

        .btn-login:hover::after {
            left: 120%;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(0, 53, 148, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* Fade in animation */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-up {
            animation: fadeUp 0.7s ease-out forwards;
        }

        .animate-fade-up-delay {
            animation: fadeUp 0.7s ease-out 0.15s forwards;
            opacity: 0;
        }

        .animate-fade-up-delay-2 {
            animation: fadeUp 0.7s ease-out 0.3s forwards;
            opacity: 0;
        }

        /* Shake animation for errors */
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            15%,
            45%,
            75% {
                transform: translateX(-8px);
            }

            30%,
            60%,
            90% {
                transform: translateX(8px);
            }
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        /* Spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body class="bg-animate flex items-center justify-center min-h-screen p-4">
    <!-- Floating particles -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="w-full max-w-md">
        <!-- Logo Section -->
        <div class="text-center mb-8 animate-fade-up">
            <img src="KCLAS_Logo.jpg" alt="KCLAS Logo"
                class="h-16 md:h-20 mx-auto mb-4 rounded-xl shadow-lg border-2 border-white/20">
            <h1 class="text-2xl md:text-3xl font-extrabold text-white tracking-tight drop-shadow-lg">
                Exam Cell Portal
            </h1>
            <p class="text-blue-200 text-sm mt-2 font-medium">
                Kristu Jayanti College — Attendance Management
            </p>
        </div>

        <!-- Login Card -->
        <div class="login-card rounded-3xl shadow-2xl p-8 md:p-10 animate-fade-up-delay" id="loginCard">
            <!-- Role Selection -->
            <div class="mb-8">
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-3">
                    Select Your Role
                </label>
                <div class="grid grid-cols-2 gap-4">
                    <div class="role-card active rounded-xl p-4 text-center relative" id="roleAdmin"
                        onclick="selectRole('admin')">
                        <div
                            class="role-check absolute top-2 right-2 w-5 h-5 bg-primary rounded-full flex items-center justify-center">
                            <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                stroke-width="3">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
                            </svg>
                        </div>
                        <div
                            class="role-icon w-12 h-12 mx-auto rounded-xl bg-gradient-to-br from-primary to-primary-light flex items-center justify-center mb-3 text-white transition-all">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z">
                                </path>
                            </svg>
                        </div>
                        <div class="font-bold text-slate-800 text-sm">Admin</div>
                        <div class="text-[10px] text-slate-400 mt-1 font-medium">Manage Exams</div>
                    </div>
                    <div class="role-card rounded-xl p-4 text-center relative" id="roleInvigilator"
                        onclick="selectRole('invigilator')">
                        <div
                            class="role-check absolute top-2 right-2 w-5 h-5 bg-primary rounded-full flex items-center justify-center">
                            <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                stroke-width="3">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
                            </svg>
                        </div>
                        <div
                            class="role-icon w-12 h-12 mx-auto rounded-xl bg-slate-100 flex items-center justify-center mb-3 text-slate-500 transition-all">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z">
                                </path>
                            </svg>
                        </div>
                        <div class="font-bold text-slate-800 text-sm">Invigilator</div>
                        <div class="text-[10px] text-slate-400 mt-1 font-medium">Mark Attendance</div>
                    </div>
                </div>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="space-y-5">
                    <div>
                        <label for="username"
                            class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Username</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z">
                                    </path>
                                </svg>
                            </div>
                            <input type="text" id="username" placeholder="Enter your username" autocomplete="username"
                                class="login-input w-full pl-12 pr-4 py-3.5 border-2 border-slate-200 rounded-xl outline-none bg-slate-50/50 focus:border-primary focus:bg-white text-sm font-medium">
                        </div>
                    </div>

                    <div>
                        <label for="password"
                            class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z">
                                    </path>
                                </svg>
                            </div>
                            <input type="password" id="password" placeholder="Enter your password"
                                autocomplete="current-password"
                                class="login-input w-full pl-12 pr-12 py-3.5 border-2 border-slate-200 rounded-xl outline-none bg-slate-50/50 focus:border-primary focus:bg-white text-sm font-medium">
                            <button type="button" onclick="togglePassword()"
                                class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 transition-colors"
                                id="togglePwdBtn">
                                <svg class="w-5 h-5" id="eyeIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.64 0 8.577 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.64 0-8.577-3.007-9.963-7.178z">
                                    </path>
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Error Message -->
                <div id="errorMsg"
                    class="hidden mt-4 p-3 bg-red-50 text-red-600 border border-red-200 rounded-xl text-sm font-semibold text-center">
                </div>

                <!-- Submit Button -->
                <button type="submit" id="loginBtn"
                    class="btn-login w-full mt-7 py-4 bg-gradient-to-r from-primary to-primary-light text-white rounded-xl font-bold text-base tracking-wide flex items-center justify-center gap-2">
                    <span id="loginBtnText">Sign In</span>
                    <div id="loginSpinner" class="spinner hidden"></div>
                    <svg id="loginArrow" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3">
                        </path>
                    </svg>
                </button>
            </form>

            <!-- Credentials Hint -->
            <div class="mt-6 p-4 bg-blue-50/80 rounded-xl border border-blue-100">
                <div class="flex items-start gap-2">
                    <svg class="w-4 h-4 text-blue-500 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z">
                        </path>
                    </svg>
                    <div id="credentialHint" class="text-xs text-blue-600 font-medium leading-relaxed">
                        <span class="font-bold">Admin:</span> admin / admin123<br>
                        <span class="font-bold">Invigilator:</span> invigilator / invig123
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-4 mb-6">
            <p class="text-blue-300/60 text-[10px] font-medium">
                &copy; 2026 KCLAS Exam Cell &bull; Dept of Data Science
            </p>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const API_BASE = window.APP_CONFIG ? window.APP_CONFIG.getApiBase() : `${window.location.protocol}//${window.location.hostname}:8000/api`;
        let selectedRole = 'admin';

        // Check if already logged in
        (function checkAuth() {
            const token = sessionStorage.getItem('auth_token');
            const role = sessionStorage.getItem('auth_role');
            if (token && role) {
                // Verify token is still valid
                fetch(`${API_BASE}/auth/verify`, {
                    headers: { 'X-Auth-Token': token }
                }).then(res => {
                    if (res.ok) {
                        redirectToPortal(role);
                    } else {
                        sessionStorage.removeItem('auth_token');
                        sessionStorage.removeItem('auth_role');
                    }
                }).catch(() => { });
            }
        })();

        function selectRole(role) {
            selectedRole = role;
            const adminCard = document.getElementById('roleAdmin');
            const invigCard = document.getElementById('roleInvigilator');

            if (role === 'admin') {
                adminCard.classList.add('active');
                invigCard.classList.remove('active');
            } else {
                invigCard.classList.add('active');
                adminCard.classList.remove('active');
            }
        }

        function togglePassword() {
            const pw = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (pw.type === 'password') {
                pw.type = 'text';
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round"
                    d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />`;
            } else {
                pw.type = 'password';
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round"
                    d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.64 0 8.577 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.64 0-8.577-3.007-9.963-7.178z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />`;
            }
        }

        async function handleLogin(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');
            const spinner = document.getElementById('loginSpinner');
            const arrow = document.getElementById('loginArrow');

            // Validation
            if (!username || !password) {
                showError('Please enter both username and password.');
                return;
            }

            // Loading state
            loginBtn.disabled = true;
            btnText.textContent = 'Signing in...';
            spinner.classList.remove('hidden');
            arrow.classList.add('hidden');
            errorEl.classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        role: selectedRole,
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Login failed');
                }

                // Store token and role
                sessionStorage.setItem('auth_token', data.token);
                sessionStorage.setItem('auth_role', data.role);

                // Success animation
                loginBtn.classList.remove('from-primary', 'to-primary-light');
                loginBtn.classList.add('from-green-500', 'to-green-600');
                btnText.textContent = '✓ Success!';
                spinner.classList.add('hidden');

                // Redirect
                setTimeout(() => {
                    redirectToPortal(data.role);
                }, 600);
            } catch (error) {
                showError(error.message);
                loginBtn.disabled = false;
                btnText.textContent = 'Sign In';
                spinner.classList.add('hidden');
                arrow.classList.remove('hidden');
            }
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.remove('hidden');
            document.getElementById('loginCard').classList.add('shake');
            setTimeout(() => {
                document.getElementById('loginCard').classList.remove('shake');
            }, 500);
        }

        function redirectToPortal(role) {
            if (role === 'admin') {
                window.location.href = '/admin';
            } else if (role === 'invigilator') {
                window.location.href = '/invigilator';
            }
        }
    </script>
</body>

</html>
