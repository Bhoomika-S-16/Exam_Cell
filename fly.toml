app = "exam-attendance-system"
primary_region = "iad"

[env]
  DATABASE_URL = "sqlite:////data/app.db"

[mounts]
  source = "exam_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
